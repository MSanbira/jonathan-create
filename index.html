<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Ball Shooting Gallery - Jonathan's Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>⚡ Electric Shooting Gallery ⚡</h1>
            <div class="stats">
                <span class="score">Score: <span id="score">0</span></span>
                <span class="shots">Shots: <span id="shots">0</span></span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="instructions">
            Click anywhere to shoot electric balls at the targets!
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
